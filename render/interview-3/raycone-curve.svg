<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 268" font-size="16" font-family="'IBM Plex Sans',sans-serif">
  <title>Ray cone reflected off planar, convex, and concave surfaces</title>
  <style>
    .ink {stroke:#16404f;} .axis{stroke:#16404f;}
    .normal{stroke:#f5a623;stroke-width:1.5;stroke-dasharray:5 4;}
    .inw{fill:#9aa7ad;fill-opacity:0.30;stroke:#6b7780;stroke-width:1.4;}
    .outw{fill:#2bb673;fill-opacity:0.18;stroke:#2bb673;stroke-width:1.8;}
    .vext{stroke:#2bb673;stroke-width:1.2;stroke-dasharray:4 3;fill:none;}
    .lbl{fill:#16404f;} .green{fill:#2bb673;} .grey{fill:#6b7780;}
    @media (prefers-color-scheme: dark){.ink,.axis{stroke:#cdd6da;} .lbl{fill:#cdd6da;}}
  </style>

  <rect x="150" y="14" width="20" height="11" class="inw"/>
  <text x="176" y="24" class="grey">incident cone</text>
  <rect x="320" y="14" width="20" height="11" class="outw"/>
  <text x="346" y="24" class="green">reflected cone</text>

  <!-- ============ planar : beta = 0 ============ -->
  <line x1="38.0" y1="150.0" x2="182.0" y2="150.0" class="ink" stroke-width="2.6"/>
  <line x1="110.0" y1="150.0" x2="110.0" y2="105.0" class="normal"/>
  <polygon points="93.21,114.0 122.36,150.0 100.21,150.0" class="inw"/>
  <polygon points="100.21,150.0 122.36,150.0 149.89,116.0 106.82,116.0" class="outw"/>
  <line x1="122.36" y1="150.0" x2="93.21" y2="186.0" class="vext"/>
  <line x1="100.21" y1="150.0" x2="93.21" y2="186.0" class="vext"/>
  <circle cx="93.21" cy="186.0" r="3.6" fill="none" stroke="#2bb673" stroke-width="1.6"/>
  <text x="93.0" y="200.0" text-anchor="middle" class="green" font-size="13" font-style="italic">virtual focus</text>
  <circle cx="110.0" cy="150.0" r="3" class="lbl"/>
  <text x="110.0" y="218.0" text-anchor="middle" class="lbl">planar</text>
  <text x="110.0" y="235.0" text-anchor="middle" class="lbl" font-size="14">&#946; = 0</text>

  <!-- ============ convex : beta > 0 ============ -->
  <path d="M 260.0 174.8 A 85.0 85.0 0 0 1 380.0 174.8" class="ink" fill="none" stroke-width="2.6"/>
  <line x1="320.0" y1="150.0" x2="320.0" y2="105.0" class="normal"/>
  <polygon points="303.21,114.0 332.36,150.0 310.21,150.0" class="inw"/>
  <polygon points="310.21,150.0 332.36,150.0 365.19,116.0 313.78,116.0" class="outw"/>
  <line x1="332.36" y1="150.0" x2="307.50" y2="175.74" class="vext"/>
  <line x1="310.21" y1="150.0" x2="307.50" y2="175.74" class="vext"/>
  <circle cx="307.50" cy="175.74" r="3.6" fill="none" stroke="#2bb673" stroke-width="1.6"/>
  <text x="307.50" y="190.0" text-anchor="middle" class="green" font-size="13" font-style="italic">virtual focus</text>
  <circle cx="320.0" cy="150.0" r="3" class="lbl"/>
  <text x="320.0" y="218.0" text-anchor="middle" class="lbl">convex</text>
  <text x="320.0" y="235.0" text-anchor="middle" class="lbl" font-size="14">&#946; &gt; 0</text>

  <!-- ============ concave : beta < 0, converges to a real focus then re-diverges ============ -->
  <path d="M 470.0 125.2 A 85.0 85.0 0 0 0 590.0 125.2" class="ink" fill="none" stroke-width="2.6"/>
  <line x1="530.0" y1="150.0" x2="530.0" y2="105.0" class="normal"/>
  <polygon points="513.21,114.0 542.36,150.0 520.21,150.0" class="inw"/>
  <line x1="530.0" y1="150.0" x2="552.38" y2="102.0" class="vext"/>
  <polygon points="520.21,150.0 542.36,150.0 546.79,114.0" class="outw"/>
  <polygon points="546.79,114.0 548.02,104.0 554.17,104.0" class="outw"/>
  <circle cx="530.0" cy="150.0" r="3" class="lbl"/>
  <circle cx="546.79" cy="114.0" r="3.6" class="green"/>
  <text x="556.0" y="112.0" text-anchor="start" class="green" font-size="13">real focus</text>
  <text x="530.0" y="218.0" text-anchor="middle" class="lbl">concave</text>
  <text x="530.0" y="235.0" text-anchor="middle" class="lbl" font-size="14">&#946; &lt; 0</text>
</svg>
