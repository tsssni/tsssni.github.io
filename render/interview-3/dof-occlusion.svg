<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 300" font-size="16" font-family="'IBM Plex Sans',sans-serif">
  <title>Near surface blocks the central rays of the far surface, occluding the center of the far CoC</title>
  <style>
    .axis{stroke:#16404f;stroke-width:1;stroke-dasharray:4 4;}
    .lens{stroke:#16404f;stroke-width:2.4;fill:none;}
    .film{stroke:#16404f;stroke-width:2.6;}
    .far{stroke:#2bb673;stroke-width:1.8;fill:none;}
    .fardash{stroke:#2bb673;stroke-width:1.5;stroke-dasharray:5 4;fill:none;}
    .near{stroke:#f5a623;stroke-width:1.2;fill:none;}
    .surfn{stroke:#f5a623;stroke-width:3.4;}
    .surff{stroke:#2bb673;stroke-width:3.4;}
    .lbl{fill:#16404f;} .green{fill:#2bb673;} .amber{fill:#f5a623;} .grey{fill:#6b7780;}
    @media (prefers-color-scheme: dark){.axis,.lens,.film{stroke:#cdd6da;} .lbl{fill:#cdd6da;}}
  </style>

  <rect x="556" y="34" width="12" height="10" fill="#f5a623" fill-opacity="0.85" stroke="#f5a623"/>
  <text x="574" y="43" class="amber" font-size="13">near CoC</text>
  <rect x="556" y="52" width="12" height="10" fill="#2bb673" fill-opacity="0.28" stroke="#2bb673"/>
  <text x="574" y="61" class="green" font-size="13">far CoC</text>

  <line x1="120" y1="160" x2="655" y2="160" class="axis"/>

  <polyline points="140,160 430,90 600,114" class="far"/>
  <polyline points="140,160 430,230 600,206" class="far"/>
  <line x1="140" y1="160" x2="290" y2="144" class="far"/>
  <polyline points="290,144 430,130 600,140" class="fardash"/>
  <line x1="140" y1="160" x2="290" y2="176" class="far"/>
  <polyline points="290,176 430,190 600,180" class="fardash"/>

  <polyline points="290,160 430,90 600,134" class="near"/>
  <polyline points="290,160 430,130 600,147" class="near"/>
  <polyline points="290,160 430,190 600,173" class="near"/>
  <polyline points="290,160 430,230 600,186" class="near"/>

  <ellipse cx="430" cy="160" rx="7" ry="72" class="lens"/>
  <text x="430" y="250" text-anchor="middle" class="grey" font-size="13">lens</text>

  <line x1="140" y1="124" x2="140" y2="196" class="surff"/>
  <circle cx="140" cy="160" r="3.5" class="green"/>
  <text x="140" y="214" text-anchor="middle" class="green" font-size="13">far (d &gt; P)</text>

  <line x1="290" y1="128" x2="290" y2="192" class="surfn"/>
  <circle cx="290" cy="160" r="3.5" class="amber"/>
  <circle cx="290" cy="144" r="2.6" class="lbl"/>
  <circle cx="290" cy="176" r="2.6" class="lbl"/>
  <text x="290" y="214" text-anchor="middle" class="amber" font-size="13">near (d &lt; P)</text>

  <line x1="600" y1="108" x2="600" y2="212" class="film"/>
  <text x="600" y="100" text-anchor="middle" class="grey" font-size="13">film</text>

  <circle cx="600" cy="160" r="46" fill="#2bb673" fill-opacity="0.28" stroke="#2bb673"/>
  <circle cx="600" cy="160" r="26" fill="#f5a623" fill-opacity="0.85" stroke="#f5a623"/>

  <text x="350" y="286" text-anchor="middle" class="grey" font-size="13">the near surface blocks the far surface's central rays, so the near CoC covers the center of the far CoC</text>
</svg>
