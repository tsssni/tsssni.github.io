<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" font-size="17" font-family="'IBM Plex Sans',sans-serif">
  <title>Ray cone reflection at oblique incidence (astigmatism)</title>
  <style>
    .ink   { stroke:#16404f; }
    .inkf  { fill:#16404f; }
    .guide { stroke:#9aa7ad; stroke-width:1.1; stroke-dasharray:4 4; }
    .normal{ stroke:#f5a623; stroke-width:1.8; stroke-dasharray:6 4; }
    .rin   { stroke:#4c8dff; stroke-width:2.2; }
    .rinc  { stroke:#4c8dff; stroke-width:1.3; stroke-dasharray:5 4; }
    .rout  { stroke:#2bb673; stroke-width:2.2; }
    .routc { stroke:#2bb673; stroke-width:1.3; stroke-dasharray:5 4; }
    .lbl   { fill:#16404f; font-family:'IBM Plex Sans',sans-serif; }
    .blue  { fill:#4c8dff; font-family:'IBM Plex Sans',sans-serif; }
    .green { fill:#2bb673; font-family:'IBM Plex Sans',sans-serif; }
    .amber { fill:#f5a623; font-family:'IBM Plex Sans',sans-serif; }
    .dot   { fill:#16404f; }
    @media (prefers-color-scheme: dark) {
      .ink { stroke:#cdd6da; }
      .inkf, .lbl { fill:#cdd6da; }
      .dot { fill:#cdd6da; }
    }
  </style>
  <defs>
    <marker id="ar-in" markerWidth="5" markerHeight="5" refX="4.4" refY="2.5" orient="auto">
      <path d="M0,0 L5,2.5 L0,5 z" fill="#4c8dff"/>
    </marker>
    <marker id="ar-out" markerWidth="5" markerHeight="5" refX="4.4" refY="2.5" orient="auto">
      <path d="M0,0 L5,2.5 L0,5 z" fill="#2bb673"/>
    </marker>
  </defs>

  <!-- curved mirror surface -->
  <path d="M 425.80 150.00 A 300 300 0 0 1 425.80 250.00" class="ink" fill="none" stroke-width="3"/>
  <text x="438.00" y="142.00" text-anchor="start" class="lbl" >mirror  c = 1/R</text>

  <!-- normal through curvature center C -->
  <line x1="470.00" y1="200.00" x2="110.00" y2="200.00" class="normal" />
  <text x="455.00" y="218.00" text-anchor="middle" class="amber" font-style="italic" >N</text>

  <!-- incident cone: chief + two edge rays from focus O -->
  <line x1="230.80" y1="85.00" x2="430.00" y2="200.00" class="rinc" />
  <line x1="230.80" y1="85.00" x2="428.50" y2="169.60" class="rin" marker-end="url(#ar-in)"/>
  <line x1="230.80" y1="85.00" x2="428.00" y2="235.20" class="rin" marker-end="url(#ar-in)"/>

  <!-- reflected cone: edge rays converge at tangential focus I_t -->
  <line x1="428.50" y1="169.60" x2="235.75" y2="327.70" class="rout" marker-end="url(#ar-out)"/>
  <line x1="428.00" y1="235.20" x2="236.00" y2="294.90" class="rout" marker-end="url(#ar-out)"/>
  <!-- reflected chief ray to sagittal focus I_s -->
  <line x1="430.00" y1="200.00" x2="230.80" y2="315.00" class="routc" />

  <!-- angle of incidence / reflection -->
  <path d="M 384.00 200.00 A 46 46 0 0 0 390.20 177.00" class="ink" fill="none" stroke-width="1.3"/>
  <text x="392.00" y="174.00" text-anchor="start" class="lbl" font-style="italic" >&#952;</text>
  <path d="M 384.00 200.00 A 46 46 0 0 1 390.20 223.00" class="ink" fill="none" stroke-width="1.3"/>
  <text x="392.00" y="233.00" text-anchor="start" class="lbl" font-style="italic" >&#952;</text>

  <!-- key points -->
  <!-- camera at cone focus O -->
  <g transform="translate(230.80,85.00) rotate(30)">
    <rect x="-23" y="-7" width="14" height="14" rx="1.5" class="ink" fill="none" stroke-width="1.6"/>
    <polygon points="-9,-5 -9,5 0,7 0,-7" class="ink" fill="none" stroke-width="1.6"/>
    <rect x="-19" y="-11" width="6" height="4" class="ink" fill="none" stroke-width="1.4"/>
  </g>
  <circle cx="230.80" cy="85.00" r="3.4" class="dot"/>
  <text x="246.00" y="84.00" text-anchor="start" class="lbl" font-style="italic" >O</text>
  <text x="244.00" y="58.00" text-anchor="start" class="lbl" font-size="14" >camera</text>
  <circle cx="430.00" cy="200.00" r="3.4" class="dot"/>
  <text x="438.00" y="196.00" text-anchor="start" class="lbl" font-style="italic" >P</text>
  <circle cx="110.00" cy="200.00" r="3.4" class="dot"/>
  <text x="110.00" y="190.00" text-anchor="middle" class="amber" font-style="italic" >C</text>
  <circle cx="300.00" cy="275.00" r="3.8" class="green"/>
  <line x1="304.00" y1="279.00" x2="328.00" y2="303.00" stroke="#2bb673" stroke-width="1.0"/>
  <text x="332.00" y="308.00" text-anchor="start" class="green" font-style="italic" >I<tspan font-size="12" dy="4">t</tspan><tspan font-size="13" dy="-4" font-style="normal" >  tangential</tspan></text>
  <circle cx="230.80" cy="315.00" r="3.8" fill="none" stroke="#2bb673" stroke-width="1.8"/>
  <line x1="227.00" y1="318.00" x2="223.00" y2="343.00" stroke="#2bb673" stroke-width="1.0"/>
  <text x="222.00" y="350.00" text-anchor="end" class="green" font-style="italic" >I<tspan font-size="12" dy="4">s</tspan><tspan font-size="13" dy="-4" font-style="normal" >  sagittal (out of plane)</tspan></text>

  <!-- legend -->
  <line x1="34.00" y1="34.00" x2="62.00" y2="34.00" class="rin" marker-end="url(#ar-in)"/>
  <text x="70.00" y="39.00" text-anchor="start" class="blue" >incident cone  (focus O)</text>
  <line x1="34.00" y1="60.00" x2="62.00" y2="60.00" class="rout" marker-end="url(#ar-out)"/>
  <text x="70.00" y="65.00" text-anchor="start" class="green" >reflected cone</text>
  <line x1="34.00" y1="86.00" x2="62.00" y2="86.00" class="normal" />
  <text x="70.00" y="91.00" text-anchor="start" class="amber" >normal  N &#8594; C</text>
</svg>
